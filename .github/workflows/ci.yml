name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

# Cancel in-progress runs when a new commit lands on the same branch / PR.
# Saves CI minutes and gives faster feedback on the latest push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Build-time dummy env vars. Real values live in Vercel project settings.
    # These satisfy module-load env checks (src/db/index.ts, auth.ts) without
    # exposing or requiring real secrets. No DB connection is attempted during
    # `next build`, so a fake DATABASE_URL is harmless.
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?sslmode=disable
      AUTH_SECRET: ci-only-secret-not-used-in-production
      AUTH_URL: http://localhost:3000
      AUTH_GOOGLE_ID: ci-placeholder.apps.googleusercontent.com
      AUTH_GOOGLE_SECRET: ci-placeholder-secret
      AUTH_RESEND_KEY: re_ci_placeholder

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
